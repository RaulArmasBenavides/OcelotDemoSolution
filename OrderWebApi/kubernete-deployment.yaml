apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-portsadapterbackendimplementation
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-portsadapterbackendimplementation
  template:
    metadata:
      labels:
        app: api-portsadapterbackendimplementation
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: api-portsadapterbackendimplementation
        image: #{dockerImage}#
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - mountPath: /app/appsettings
          name: appsettings
      volumes:
        - name: appsettings
          configMap:
            name: appsettings-json
            items:
              - key: appsettings.json
                path: appsettings.json